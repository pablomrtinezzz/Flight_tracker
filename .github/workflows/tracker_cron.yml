name: Flight Tracker Cron

on:
  schedule:
    - cron: '0 0 * * 1' # Ejecución TODOS LOS LUNES (4 o 5 veces al mes)
  workflow_dispatch: # Mantenemos el botón para cuando tú quieras forzarlo

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    # Permisos necesarios para que el bot pueda escribir en tu repo
    permissions:
      contents: write

    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Ejecutar Rastreador
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCOUNT_THRESHOLD: ${{ secrets.DISCOUNT_THRESHOLD }}
        run: python src/tracker.py

      - name: Guardar base de datos en el repositorio
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/flights.db
          git commit -m "🤖 Update flight data [skip ci]" || echo "No hay cambios para subir"
          git push